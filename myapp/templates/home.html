{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OncoWell - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
    <div class="nav">
        <a href="{% url 'beneficios' %}" class="nav-item">Benefícios</a>
        <a href="{% url 'informacoes' %}" class="nav-item">Informações</a>
        <a href="{% url 'journaling' %}" class="nav-item">Journaling</a>
        <a href="{% url 'testemunhos' %}" class="nav-item">Testemunhos</a>
        <a href="{% url 'q&a' %}" class="nav-item">Q&A</a>
    </div>

    {% if user.is_authenticated %}
    <a href="#" class="user-icon" onclick="toggleUserMenu()">
        <i class="fas fa-user"></i>
    </a>
    <div class="user-menu" id="userMenu">
        <a href="{% url 'logout' %}">Terminar Sessão</a>
    </div>
    {% else %}
    <a href="{% url 'login' %}" class="login-button">Login</a>
    {% endif %}

    <a href="{% url 'home' %}" class="logo">
        <img src="{% static 'images/logo_oncowell.png' %}" alt="Logo" style="width: 100%; height: 100%;">
    </a>

    <div class="main-content">
        <img src="{% static 'images/img_paginainicial.png' %}" alt="Imagem Principal" >
    </div>

    <script>
        function toggleUserMenu() {
            const menu = document.getElementById('userMenu');
            menu.classList.toggle('active');
        }

        // Fechar o menu quando clicar fora dele
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('userMenu');
            const userIcon = document.querySelector('.user-icon');
            if (!menu.contains(event.target) && !userIcon.contains(event.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
